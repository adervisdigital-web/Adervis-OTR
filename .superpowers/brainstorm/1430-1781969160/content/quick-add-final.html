<h2>Дизайн: Quick Add Modal</h2>
<p class="subtitle">Так будет выглядеть модалка. Нажми "+ Лид" чтобы увидеть поведение.</p>

<div class="mockup">
  <div class="mockup-header">Финальный дизайн — Quick Add Modal</div>
  <div class="mockup-body" style="background:#010102;padding:0;border-radius:0;min-height:420px;display:flex;align-items:center;justify-content:center;font-family:ui-sans-serif,sans-serif;">

    <!-- Trigger button (simulates the + in header / mobile FAB) -->
    <div style="position:absolute;top:12px;right:16px;" id="triggerArea">
      <button onclick="openModal()"
              style="background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
        + Лид
      </button>
    </div>

    <!-- Overlay -->
    <div id="qaOverlay" onclick="closeModal()"
         style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;"></div>

    <!-- Modal -->
    <div id="qaModal"
         style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
                z-index:101;width:440px;max-width:calc(100vw - 32px);
                background:#141516;border:1px solid #3a3d44;border-radius:16px;
                box-shadow:0 24px 80px rgba(0,0,0,.85);overflow:hidden;">

      <!-- Header -->
      <div style="padding:16px 20px 12px;border-bottom:1px solid #23252a;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:15px;font-weight:700;color:#f7f8f8;">➕ Новый лид</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#8a8f98;font-size:18px;cursor:pointer;padding:0;line-height:1;">✕</button>
      </div>

      <!-- Body -->
      <div style="padding:20px;display:flex;flex-direction:column;gap:14px;">

        <!-- URL field — primary -->
        <div>
          <label style="display:block;font-size:11px;color:#8a8f98;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">
            Ссылка (VK / Instagram / Telegram)
          </label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input id="qaUrl"
                   oninput="onUrlInput(this.value)"
                   onpaste="setTimeout(()=>onUrlInput(document.getElementById('qaUrl').value),0)"
                   style="flex:1;background:#0f1011;border:1px solid #3a3d44;border-radius:8px;
                          padding:10px 12px;font-size:13px;color:#f7f8f8;outline:none;
                          transition:border-color .15s;"
                   placeholder="vk.com/coffeecherry или @coffeecherry"
                   onfocus="this.style.borderColor='#7c3aed'"
                   onblur="this.style.borderColor='#3a3d44'">
            <div id="qaUrlStatus" style="font-size:18px;width:24px;text-align:center;flex-shrink:0;opacity:0;transition:opacity .2s;"></div>
          </div>
          <div id="qaPlatformTag" style="margin-top:6px;display:none;">
            <span id="qaPlatformLabel" style="display:inline-flex;align-items:center;gap:4px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:#a78bfa;border-radius:20px;padding:2px 10px;font-size:11px;"></span>
          </div>
        </div>

        <!-- Name field — auto-filled but editable -->
        <div>
          <label style="display:block;font-size:11px;color:#8a8f98;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">
            Название <span id="qaAutoLabel" style="color:#27a644;display:none;">✨ автозаполнено</span>
          </label>
          <input id="qaName"
                 style="width:100%;background:#0f1011;border:1px solid #3a3d44;border-radius:8px;
                        padding:10px 12px;font-size:13px;color:#f7f8f8;outline:none;
                        box-sizing:border-box;transition:border-color .15s;"
                 placeholder="Название заведения"
                 onfocus="this.style.borderColor='#7c3aed'"
                 onblur="this.style.borderColor='#3a3d44'">
        </div>

        <!-- Segment — compact -->
        <div>
          <label style="display:block;font-size:11px;color:#8a8f98;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Сегмент</label>
          <select id="qaBiz"
                  style="width:100%;background:#0f1011;border:1px solid #3a3d44;border-radius:8px;
                         padding:10px 12px;font-size:13px;color:#8a8f98;outline:none;
                         box-sizing:border-box;">
            <option value="">— не указан —</option>
            <option>Общепит</option>
            <option>Кофейня</option>
            <option>Бар / Кальянная</option>
            <option>Барбершоп</option>
            <option>Салон красоты</option>
            <option>Фитнес / Спорт</option>
            <option>Другое</option>
          </select>
        </div>

        <!-- Footer: playbook + add button -->
        <div style="display:flex;align-items:center;gap:10px;padding-top:4px;">
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#8a8f98;cursor:pointer;flex-shrink:0;">
            <input type="checkbox" id="qaPlaybook" checked style="cursor:pointer;accent-color:#7c3aed;"> Playbook
          </label>
          <button id="qaSubmitBtn"
                  onclick="submitQA()"
                  style="flex:1;background:#7c3aed;color:#fff;border:none;border-radius:10px;
                         padding:11px;font-size:14px;font-weight:600;cursor:pointer;
                         transition:background .15s;"
                  onmouseover="this.style.background='#8b5cf6'"
                  onmouseout="this.style.background='#7c3aed'">
            ✓ Добавить в воронку
          </button>
        </div>

      </div>
    </div>

    <!-- Idle state -->
    <div id="idleState" style="text-align:center;color:#8a8f98;">
      <div style="font-size:32px;margin-bottom:12px;">👆</div>
      <div style="font-size:14px;">Нажми <strong style="color:#f7f8f8;">+ Лид</strong> в правом верхнем углу</div>
      <div style="font-size:12px;margin-top:6px;">или попробуй вставить ссылку в открывшуюся модалку</div>
    </div>

    <!-- Success state -->
    <div id="successState" style="display:none;text-align:center;color:#27a644;">
      <div style="font-size:40px;margin-bottom:12px;">✅</div>
      <div style="font-size:15px;font-weight:700;color:#f7f8f8;" id="successName">Coffee Cherry</div>
      <div style="font-size:12px;color:#8a8f98;margin-top:6px;">Добавлен · открываем чат...</div>
    </div>

  </div>
</div>

<script>
function detectPlatform(url) {
  if (!url) return null;
  const u = url.toLowerCase();
  if (u.includes('vk.com') || u.includes('vkontakte')) return { icon: '🔵', name: 'VK' };
  if (u.includes('instagram.com') || u.includes('instagr.am')) return { icon: '🟣', name: 'Instagram' };
  if (u.includes('t.me') || u.includes('telegram')) return { icon: '💬', name: 'Telegram' };
  if (u.startsWith('@')) return { icon: '💬', name: 'Telegram' };
  return null;
}

function extractName(url) {
  if (!url) return '';
  const u = url.trim().replace(/^https?:\/\//, '').replace(/^www\./, '');
  // @handle
  if (u.startsWith('@')) return u.slice(1).replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  // t.me/handle
  const tme = u.match(/t\.me\/([^/?#]+)/);
  if (tme) return tme[1].replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  // vk.com/handle
  const vk = u.match(/vk\.com\/([^/?#]+)/);
  if (vk && vk[1] !== 'club' && vk[1] !== 'id') return vk[1].replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  // instagram.com/handle
  const ig = u.match(/instagram\.com\/([^/?#]+)/);
  if (ig) return ig[1].replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  return '';
}

function onUrlInput(val) {
  const status = document.getElementById('qaUrlStatus');
  const platformTag = document.getElementById('qaPlatformTag');
  const platformLabel = document.getElementById('qaPlatformLabel');
  const nameInput = document.getElementById('qaName');
  const autoLabel = document.getElementById('qaAutoLabel');

  if (!val.trim()) {
    status.style.opacity = '0';
    platformTag.style.display = 'none';
    autoLabel.style.display = 'none';
    return;
  }

  const platform = detectPlatform(val);
  const name = extractName(val);

  if (platform) {
    status.textContent = '✅';
    status.style.opacity = '1';
    platformLabel.textContent = platform.icon + ' ' + platform.name;
    platformTag.style.display = 'block';
  } else {
    status.textContent = '⚠️';
    status.style.opacity = '1';
    platformTag.style.display = 'none';
  }

  if (name && !nameInput.value) {
    nameInput.value = name;
    autoLabel.style.display = 'inline';
  }
}

function openModal() {
  document.getElementById('qaOverlay').style.display = 'block';
  document.getElementById('qaModal').style.display = 'block';
  document.getElementById('idleState').style.display = 'none';
  document.getElementById('successState').style.display = 'none';
  setTimeout(() => document.getElementById('qaUrl').focus(), 50);
}

function closeModal() {
  document.getElementById('qaOverlay').style.display = 'none';
  document.getElementById('qaModal').style.display = 'none';
  document.getElementById('idleState').style.display = 'block';
  document.getElementById('qaUrl').value = '';
  document.getElementById('qaName').value = '';
  document.getElementById('qaUrlStatus').style.opacity = '0';
  document.getElementById('qaPlatformTag').style.display = 'none';
  document.getElementById('qaAutoLabel').style.display = 'none';
}

function submitQA() {
  const name = document.getElementById('qaName').value.trim() || document.getElementById('qaUrl').value.trim();
  if (!name) { document.getElementById('qaUrl').style.borderColor = '#f22822'; return; }
  document.getElementById('qaOverlay').style.display = 'none';
  document.getElementById('qaModal').style.display = 'none';
  document.getElementById('idleState').style.display = 'none';
  document.getElementById('successName').textContent = name;
  document.getElementById('successState').style.display = 'block';
  setTimeout(() => {
    document.getElementById('successState').style.display = 'none';
    document.getElementById('idleState').style.display = 'block';
  }, 2200);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
